<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLLM Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-animate { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans h-screen flex overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 bg-zinc-950/90 backdrop-blur-xl z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-md p-8 shadow-2xl space-y-6">
            <div class="text-center space-y-2">
                <div class="h-12 w-12 rounded-xl bg-emerald-600 flex items-center justify-center mx-auto shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                    <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
                </div>
                <h2 id="auth-title" class="text-2xl font-bold tracking-tight">Enterprise Gateway Login</h2>
                <p id="auth-subtitle" class="text-xs text-zinc-400">Provide clearance credentials to initialize SafeLLM proxy.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider block mb-1.5">Corporate Email</label>
                    <input id="auth-email" type="email" placeholder="user@company.com" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500/50 text-white">
                </div>
                <div>
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider block mb-1.5">Secure Password</label>
                    <input id="auth-password" type="password" placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500/50 text-white">
                </div>
                <button id="auth-submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 font-medium py-3 rounded-lg text-sm tracking-wide shadow-md active:scale-98 transition-all cursor-pointer">Access Console</button>
            </div>

            <div class="text-center text-xs text-zinc-500">
                <span id="auth-toggle-text">Need dashboard access clearance?</span> 
                <button id="auth-toggle-btn" class="text-emerald-400 font-semibold hover:underline bg-transparent border-none cursor-pointer ml-1">Create Account</button>
            </div>
        </div>
    </div>

    <aside class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col shrink-0">
        <div class="p-5 border-b border-zinc-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 rounded-lg bg-emerald-600 flex items-center justify-center"><i data-lucide="shield-check" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-bold tracking-tight">SafeLLM</h1>
            </div>
        </div>

        <div class="p-4 border-b border-zinc-800">
            <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2 block">System Directive</label>
            <textarea id="system-prompt" rows="3" placeholder="You are a helpful, secure AI..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500/50 text-zinc-300 resize-none"></textarea>
        </div>

        <div class="flex-1 overflow-y-auto p-4 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-3 shrink-0">
                <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Recent Sessions</label>
                <button id="new-chat-btn" class="text-xs flex items-center gap-1 text-emerald-500 font-medium cursor-pointer"><i data-lucide="plus" class="w-3.5 h-3.5"></i> New Chat</button>
            </div>
            <div id="sessions-list" class="space-y-1.5 flex-1 overflow-y-auto pr-1"></div>
        </div>

        <div class="p-4 border-t border-zinc-800 bg-zinc-950/30 flex items-center justify-between">
            <div class="flex items-center gap-3 truncate">
                <div class="h-8 w-8 rounded-full bg-zinc-800 flex items-center justify-center border border-zinc-700 shrink-0"><i data-lucide="user" class="w-4 h-4 text-zinc-400"></i></div>
                <div class="text-sm truncate"><p id="profile-email" class="font-medium truncate">Admin User</p><p class="text-[10px] text-emerald-500">Secure Vault Session</p></div>
            </div>
            <button id="logout-btn" class="p-2 text-zinc-500 hover:text-red-400 rounded-md cursor-pointer transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-zinc-950">
        <header class="h-16 border-b border-zinc-800 flex justify-between items-center px-6 shrink-0 bg-zinc-950/50 backdrop-blur-md">
            <div class="flex items-center gap-2 text-sm text-zinc-400"><i data-lucide="zap" class="w-4 h-4 text-emerald-500"></i>Gateway Status: <span class="text-emerald-500 font-medium">ONLINE</span></div>
            <div class="flex bg-zinc-900 border border-zinc-800 rounded-lg p-1">
                <button id="toggle-flash" class="px-3 py-1.5 text-xs font-medium rounded-md bg-zinc-800 text-white border border-zinc-700 cursor-pointer">Gemini Flash</button>
                <button id="toggle-pro" class="px-3 py-1.5 text-xs font-medium rounded-md text-zinc-500 cursor-pointer">Gemini Pro</button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col justify-items-start pb-32"></div>

        <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-zinc-950 via-zinc-950 to-transparent">
            <div class="max-w-4xl mx-auto flex gap-3 items-end bg-zinc-900 border border-zinc-700 rounded-2xl p-2 shadow-2xl focus-within:border-emerald-500/50 transition-all">
                <button class="p-3 text-zinc-400 hover:text-white rounded-xl hover:bg-zinc-800"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                <textarea id="user-input" rows="1" placeholder="Send a secure query..." class="flex-1 bg-transparent py-3 text-sm focus:outline-none placeholder-zinc-500 text-white resize-none max-h-32" style="min-height: 44px;"></textarea>
                <button id="send-btn" class="p-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 shadow-md flex items-center justify-center cursor-pointer"><i data-lucide="send" class="w-5 h-5"></i></button>
            </div>
        </div>
    </main>

    <div id="alert-toast" class="fixed top-6 right-6 max-w-md bg-red-950/90 border border-red-500/30 text-red-200 px-4 py-3 rounded-xl shadow-2xl hidden items-center gap-3 msg-animate z-50 backdrop-blur-md"><i data-lucide="alert-triangle" class="text-red-400 w-5 h-5 shrink-0"></i><div class="text-xs font-medium" id="alert-text"></div></div>

    <script>
        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        // Dynamic Inbound File Upload Node
const paperclipBtn = document.querySelector('[data-lucide="paperclip"]').parentElement;
const hiddenFileInput = document.createElement('input');
hiddenFileInput.type = 'file';
hiddenFileInput.accept = '.txt,.py,.js,.json,.csv,.log,.md';
hiddenFileInput.className = 'hidden';
document.body.appendChild(hiddenFileInput);
        const systemPromptInput = document.getElementById('system-prompt');
        const sessionsList = document.getElementById('sessions-list');
        const newChatBtn = document.getElementById('new-chat-btn');
        const flashBtn = document.getElementById('toggle-flash');
        const proBtn = document.getElementById('toggle-pro');
        const logoutBtn = document.getElementById('logout-btn');
        const profileEmail = document.getElementById('profile-email');

        // Auth DOM Elements
        const authScreen = document.getElementById('auth-screen');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authToggleText = document.getElementById('auth-toggle-text');

        // App Variables
        let sessions = [];
        let currentSessionId = null;
        let selectedModel = "gemini-2.5-flash";
        let isLoginView = true;

        lucide.createIcons();
        checkAuthentication();

        // --- AUTHENTICATION INTERACTIVE HANDLERS ---
        authToggleBtn.addEventListener('click', () => {
            isLoginView = !isLoginView;
            if (isLoginView) {
                authTitle.innerText = "Enterprise Gateway Login";
                authSubtitle.innerText = "Provide clearance credentials to initialize SafeLLM proxy.";
                authSubmitBtn.innerText = "Access Console";
                authToggleText.innerText = "Need dashboard access clearance?";
                authToggleBtn.innerText = "Create Account";
            } else {
                authTitle.innerText = "Register Identity Profile";
                authSubtitle.innerText = "Create secure corporate access credentials below.";
                authSubmitBtn.innerText = "Provision Account";
                authToggleText.innerText = "Already possess key privileges?";
                authToggleBtn.innerText = "Login Instead";
            }
        });

        authSubmitBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value.trim();
            if (!email || !password) return showAlert("Please populate all credential input targets.");

            const endpoint = isLoginView ? 'login' : 'register';
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/auth/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) return showAlert(data.detail || "Authentication sequence mismatch.");

                if (isLoginView) {
                    localStorage.setItem('safellm_jwt', data.access_token);
                    localStorage.setItem('safellm_user_email', data.email);
                    checkAuthentication();
                } else {
                    isLoginView = true;
                    authToggleBtn.click();
                    showAlert("Registration successful! Enter credentials to access.");
                }
            } catch(err) {
                showAlert("Unable to negotiate connection with local authorization authority.");
            }
        });

        function checkAuthentication() {
            const token = localStorage.getItem('safellm_jwt');
            const email = localStorage.getItem('safellm_user_email');
            if (token && email) {
                authScreen.classList.add('hidden');
                profileEmail.innerText = email;
                loadPlatformData();
            } else {
                authScreen.classList.remove('hidden');
            }
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('safellm_jwt');
            localStorage.removeItem('safellm_user_email');
            sessions = [];
            currentSessionId = null;
            chatContainer.innerHTML = '';
            sessionsList.innerHTML = '';
            checkAuthentication();
        });

        // Pack global headers automatically
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('safellm_jwt')}`
            };
        }

        // --- PLATFORM CHAT MANAGEMENT LAYER ---
        async function loadPlatformData() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/sessions', { headers: getHeaders() });
                if (response.status === 401) return logoutBtn.click();
                
                sessions = await response.json();
                if (sessions.length === 0) {
                    await createNewSession();
                } else {
                    currentSessionId = sessions[0].id;
                    renderSidebar();
                    loadSessionChat(currentSessionId);
                }
            } catch (err) {
                showAlert("Database Sync Error: Is the backend server online?");
            }
        }

        async function createNewSession() {
            const newId = 'session_' + Date.now();
            const initialText = "Enterprise secure gateway initialized. All inputs are routed locally before hitting the cloud. How can I assist you?";
            
            try {
                await fetch('http://127.0.0.1:8000/api/sessions/create', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ id: newId, title: "New Secure Chat", system_prompt: systemPromptInput.value.trim() })
                });

                sessions.unshift({ id: newId, title: "New Secure Chat", systemPrompt: systemPromptInput.value.trim(), messages: [] });
                currentSessionId = newId;
                renderSidebar();
                chatContainer.innerHTML = '';
                renderMessageElement(initialText, false);
            } catch (err) {
                showAlert("Failed to instantiate server-side chat session.");
            }
        }

        newChatBtn.addEventListener('click', createNewSession);

        async function deleteSession(id, event) {
            event.stopPropagation();
            try {
                await fetch(`http://127.0.0.1:8000/api/sessions/${id}`, { method: 'DELETE', headers: getHeaders() });
                sessions = sessions.filter(s => s.id !== id);
                if (currentSessionId === id) currentSessionId = sessions.length > 0 ? sessions[0].id : null;
                if (sessions.length === 0) { await createNewSession(); } else { renderSidebar(); loadSessionChat(currentSessionId); }
            } catch(err) {
                showAlert("Failed to erase backend database record.");
            }
        }

        function renderSidebar() {
            sessionsList.innerHTML = '';
            sessions.forEach(session => {
                const isActive = session.id === currentSessionId;
                const container = document.createElement('div');
                container.className = `group flex items-center justify-between w-full rounded-lg border text-left transition-all relative ${isActive ? 'bg-zinc-800/80 text-white border-zinc-700/60 shadow-inner' : 'text-zinc-400 border-transparent hover:bg-zinc-800/40 hover:text-zinc-200'}`;
                
                const btn = document.createElement('button');
                btn.className = "flex items-center gap-3 px-3 py-2 text-sm text-left truncate flex-1 min-w-0 h-full cursor-pointer";
                btn.innerHTML = `<i data-lucide="message-square" class="w-4 h-4 shrink-0 ${isActive ? 'text-emerald-500' : 'text-zinc-500'}"></i><span class="truncate pr-2">${session.title}</span>`;
                btn.addEventListener('click', () => switchSession(session.id));
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = "p-1.5 mr-1 text-zinc-500 hover:text-red-400 rounded-md opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer shrink-0";
                deleteBtn.innerHTML = `<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>`;
                deleteBtn.addEventListener('click', (e) => deleteSession(session.id, e));

                container.appendChild(btn); container.appendChild(deleteBtn); sessionsList.appendChild(container);
            });
            lucide.createIcons();
        }

        function switchSession(id) { if (id === currentSessionId) return; currentSessionId = id; renderSidebar(); loadSessionChat(id); }

        function loadSessionChat(id) {
            chatContainer.innerHTML = '';
            const activeSession = sessions.find(s => s.id === id);
            if (!activeSession) return;
            systemPromptInput.value = activeSession.systemPrompt || '';

            if (activeSession.messages.length === 0) {
                renderMessageElement("Enterprise secure gateway initialized. All inputs are routed locally before hitting the cloud. How can I assist you?", false);
            } else {
                activeSession.messages.forEach(msg => {
                    renderMessageElement(msg.text, msg.isUser);
                    if (msg.wasRedactedNotice) renderComplianceNotice();
                });
            }
        }

        function renderComplianceNotice() {
            const notice = document.createElement('div');
            notice.className = "text-[10px] text-amber-500 bg-amber-500/10 border border-amber-500/20 px-2.5 py-1 rounded-md max-w-max self-end my-1 flex items-center gap-1.5 msg-animate";
            notice.innerHTML = `<i data-lucide="shield-alert" class="w-3 h-3"></i> Local Gateway Intercept: PII Redacted prior to upstream transit.`;
            chatContainer.appendChild(notice); lucide.createIcons();
        }

        function renderMessageElement(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 max-w-3xl msg-animate my-1 ${isUser ? 'self-end flex-row-reverse' : ''}`;
            const avatar = isUser ? `<div class="h-8 w-8 rounded-lg bg-zinc-800 border border-zinc-700 flex items-center justify-center shrink-0 mt-1"><i data-lucide="user" class="text-zinc-400 w-5 h-5"></i></div>` : `<div class="h-8 w-8 rounded-lg bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center shrink-0 mt-1"><i data-lucide="bot" class="text-emerald-500 w-5 h-5"></i></div>`;
            const bubble = isUser ? `<div class="bg-zinc-800 text-white rounded-2xl px-5 py-3 text-sm border border-zinc-700/50">${text}</div>` : `<div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 text-zinc-300 text-sm whitespace-pre-line">${text}</div>`;
            wrapper.innerHTML = avatar + bubble; chatContainer.appendChild(wrapper); lucide.createIcons();
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            const systemPrompt = systemPromptInput.value.trim();
            if (!message) return;

            renderMessageElement(message, true);
            userInput.value = ''; userInput.style.height = 'auto';

            const loadingWrapper = document.createElement('div');
            loadingWrapper.className = 'flex gap-4 max-w-3xl msg-animate';
            loadingWrapper.innerHTML = `<div class="h-8 w-8 rounded-lg bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center shrink-0 mt-1"><i data-lucide="loader" class="text-emerald-500 w-4 h-4 animate-spin"></i></div><div class="flex items-center text-xs text-zinc-500 italic">Executing transaction sequence via secured token protocol...</div>`;
            chatContainer.appendChild(loadingWrapper); chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch(`http://127.0.0.1:8000/api/chat/${currentSessionId}`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ message: message, system_prompt: systemPrompt, model: selectedModel })
                });
                
                loadingWrapper.remove();
                if (!response.ok) return showAlert((await response.json()).detail || "Gateway Error.");
                
                const data = await response.json();
                if (data.success) {
                    const freshData = await fetch('http://127.0.0.1:8000/api/sessions', { headers: getHeaders() });
                    sessions = await freshData.json();
                    renderSidebar();
                    if (data.was_redacted) renderComplianceNotice();
                    renderMessageElement(data.reply, false);
                }
            } catch (err) {
                loadingWrapper.remove(); showAlert("Backend pipeline is unresponsive.");
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        flashBtn.addEventListener('click', () => { selectedModel = "gemini-2.5-flash"; flashBtn.className = "px-3 py-1.5 text-xs font-medium rounded-md bg-zinc-800 text-white shadow-sm border border-zinc-700 cursor-pointer"; proBtn.className = "px-3 py-1.5 text-xs font-medium rounded-md text-zinc-500 cursor-pointer"; });
        proBtn.addEventListener('click', () => { selectedModel = "gemini-2.5-pro"; proBtn.className = "px-3 py-1.5 text-xs font-medium rounded-md bg-zinc-800 text-white shadow-sm border border-zinc-700 cursor-pointer"; flashBtn.className = "px-3 py-1.5 text-xs font-medium rounded-md text-zinc-500 cursor-pointer"; });
        // File Upload Interactive Handlers
paperclipBtn.addEventListener('click', () => hiddenFileInput.click());

hiddenFileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Bundle file into multipart form data
    const formData = new FormData();
    formData.append('file', file);

    // Provide immediate visual loading feedback inside chat box
    const fileNotice = document.createElement('div');
    fileNotice.className = "text-xs text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 px-3 py-2 rounded-xl max-w-max my-2 flex items-center gap-2 msg-animate";
    fileNotice.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> Inspecting & scrubbing <strong>${file.name}</strong> locally...`;
    chatContainer.appendChild(fileNotice);
    lucide.createIcons();

    try {
        const response = await fetch('http://127.0.0.1:8000/api/sandbox/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('safellm_jwt')}` },
            body: formData
        });

        fileNotice.remove();
        if (!response.ok) return showAlert((await response.json()).detail || "File processing aborted.");

        const data = await response.json();

        // Append the scrubbed text file payload straight into the chat input field for confirmation
        userInput.value += `\n[Analyzed Secure File Content: ${data.fileName}]\n${data.extracted_content}\n`;
        userInput.style.height = (userInput.scrollHeight) + 'px';

        if (data.was_redacted) {
            renderComplianceNotice();
        }
        showAlert(`Data Sandbox Sync: ${data.fileName} ingested successfully.`);
    } catch (err) {
        fileNotice.remove();
        showAlert("Network error trying to negotiate file payload.");
    }
    hiddenFileInput.value = ''; // Flush stream input
});    
    </script>
</body>
</html>
